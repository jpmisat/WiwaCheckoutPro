name: Deploy to Prod

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH Deploy
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
          # Ensure Target directory exists
          ssh -i ~/.ssh/id_ed25519 $SERVER_USER@$SERVER_IP "mkdir -p /home/wiwatour-ssh/htdocs/wiwatour.com/wp-content/plugins/WiwaCheckoutPro"
          # Rsync files
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.agents' \
            --exclude '.gemini' \
            ./ $SERVER_USER@$SERVER_IP:/home/wiwatour-ssh/htdocs/wiwatour.com/wp-content/plugins/WiwaCheckoutPro/
